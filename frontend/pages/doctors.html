<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriDefect AI | Find a Doctor</title>
  <link rel="stylesheet" href="../css/style.css?v=2">
  <style>
    /* Specific overrides for doctors page to blend with main theme */
    .doctors-hero {
      text-align: center;
      padding: 4rem 5% 2rem 5%;
    }
    
    .doctors-hero h1 {
      font-size: 3rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }
    
    .doctors-hero h1 span {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .doctors-hero p {
      font-size: 1.2rem;
      color: var(--text-secondary);
      max-width: 700px;
      margin: 0 auto 2rem auto;
      line-height: 1.6;
    }

    .search-container {
      max-width: 900px;
      margin: 0 auto 4rem auto;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }

    .search-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      .search-form {
        grid-template-columns: 1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      text-align: left;
    }

    .form-group label {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .form-control {
      background: var(--background);
      border: 1px solid var(--surface-border);
      color: var(--text-primary);
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .btn-search {
      grid-column: 1 / -1;
      margin-top: 1rem;
      padding: 1rem;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .doctor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto 4rem auto;
      padding: 0 5%;
    }

    .doctor-card {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: left;
    }

    .doctor-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      border-color: var(--primary);
    }

    .doc-header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .doc-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(14, 165, 233, 0.1) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: var(--primary);
      font-weight: 700;
      flex-shrink: 0;
      border: 2px solid rgba(16, 185, 129, 0.2);
    }

    .doc-info h3 {
      margin: 0 0 0.4rem 0;
      color: var(--text-primary);
      font-size: 1.4rem;
      font-weight: 700;
    }

    .doc-info .specialty {
      color: var(--primary);
      font-weight: 600;
      margin: 0 0 0.25rem 0;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .doc-info .quals {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin: 0;
    }

    .doc-details {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--surface-border);
    }

    .doc-detail-item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    
    .doc-detail-item svg {
      width: 18px;
      height: 18px;
      stroke: var(--primary);
      flex-shrink: 0;
      margin-top: 3px;
    }

    .loader {
      display: none;
      margin: 2rem auto;
      border: 4px solid var(--surface-border);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #no-results {
      display: none;
      text-align: center;
      margin-top: 2rem;
      color: var(--text-secondary);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main>
    <section class="doctors-hero">
      <h1>Find a <span>Specialist</span></h1>
      <p>Search for expert nutritionists, dietitians, and clinical specialists in your area powered by our intelligent AI directory.</p>
    </section>

    <div class="search-container">
      <form id="doctor-search-form" onsubmit="event.preventDefault(); findDoctors();">
        <div class="search-form">
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" class="form-control" placeholder="e.g. New York" required>
          </div>
          <div class="form-group">
            <label for="locality">Locality</label>
            <input type="text" id="locality" class="form-control" placeholder="e.g. Manhattan" required>
          </div>
          <div class="form-group">
            <label for="specialist">Specialist Type</label>
            <select id="specialist" class="form-control" required>
              <option value="" disabled selected>Select Specialty...</option>
              <option value="Nutritionist">Nutritionist</option>
              <option value="Dietitian">Clinical Dietitian</option>
              <option value="Endocrinologist">Endocrinologist</option>
              <option value="Gastroenterologist">Gastroenterologist</option>
              <option value="Dermatologist">Dermatologist</option>
              <option value="General Physician">General Physician</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            Search Doctors
          </button>
        </div>
      </form>
    </div>

    <div class="loader" id="loader"></div>
    <p id="status-message" style="text-align: center; color: var(--text-secondary); margin-top: 1rem; display: none;">Locating specialists near you...</p>
    <div id="no-results">No specialists found for this area. Please try a different locality.</div>

    <!-- Results Grid -->
    <div class="doctor-grid" id="doctor-grid">
      <!-- Cards will be populated here -->
    </div>
  </main>

  <script src="../js/main.js?v=2"></script>
  <script>
    const API_BASE = 'http://127.0.0.1:5000/api';

    async function findDoctors() {
      const city = document.getElementById('city').value.trim();
      const locality = document.getElementById('locality').value.trim();
      const specialist = document.getElementById('specialist').value;

      if (!city || !locality || !specialist) return;

      const grid = document.getElementById('doctor-grid');
      const loader = document.getElementById('loader');
      const statusMsg = document.getElementById('status-message');
      const noResults = document.getElementById('no-results');

      grid.innerHTML = '';
      noResults.style.display = 'none';
      loader.style.display = 'block';
      statusMsg.style.display = 'block';

      try {
        const res = await fetch(`${API_BASE}/ai/find_doctors`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ city, locality, specialist })
        });

        const data = await res.json();
        
        loader.style.display = 'none';
        statusMsg.style.display = 'none';

        if (data.error) {
          alert("Error: " + data.error);
          return;
        }

        if (data.doctors && data.doctors.length > 0) {
          renderDoctors(data.doctors);
        } else {
          noResults.style.display = 'block';
        }

      } catch (err) {
        console.error(err);
        alert("Failed to connect to the server.");
        loader.style.display = 'none';
        statusMsg.style.display = 'none';
      }
    }

    function renderDoctors(doctors) {
      const grid = document.getElementById('doctor-grid');
      
      doctors.forEach(doc => {
        // Fallbacks for simulated data
        const initials = doc.name.split(' ').map(n => n[0]).join('').substring(0, 2);
        
        const card = document.createElement('div');
        card.className = 'doctor-card';
        card.innerHTML = `
          <div class="doc-header">
            <div class="doc-avatar">${initials}</div>
            <div class="doc-info">
              <h3>${doc.name}</h3>
              <p class="specialty">${doc.specialty}</p>
              <p class="quals">${doc.qualifications}</p>
            </div>
          </div>
          <div class="doc-details">
            <div class="doc-detail-item">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
              <span><strong style="color: var(--text-primary);">${doc.clinic_name}</strong><br>${doc.address}</span>
            </div>
            <div class="doc-detail-item">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span>${doc.experience} Years of Clinical Experience</span>
            </div>
            <div class="doc-detail-item">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span>${doc.phone || doc.phone_no || 'N/A'}</span>
            </div>
            <div class="doc-detail-item">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <span>${doc.email || 'N/A'}</span>
            </div>
          </div>
          <button class="btn btn-outline" style="margin-top: auto; width: 100%; border-color: var(--primary); color: var(--primary);" onclick="alert('Booking functionality coming soon!')">Book Appointment</button>
        `;
        grid.appendChild(card);
      });
    }
  </script>
</body>
</html>
