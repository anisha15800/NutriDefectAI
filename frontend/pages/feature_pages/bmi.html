<div class="feature-content fade-in">
    <h2>BMI Calculator</h2>
    <p>Calculate your Body Mass Index (BMI) to understand your health category.</p>
    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <div class="form-group" style="flex: 1;">
            <label>Weight (kg)</label>
            <input type="number" id="bmi-weight" placeholder="e.g., 70" style="width: 100%; border-radius: 8px; padding: 1rem; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--surface-border);">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Height (cm)</label>
            <input type="number" id="bmi-height" placeholder="e.g., 175" style="width: 100%; border-radius: 8px; padding: 1rem; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--surface-border);">
        </div>
    </div>
    <button class="btn btn-primary" onclick="calculateBMI()">Calculate</button>
    <div id="bmi-result" style="margin-top: 1.5rem; font-size: 1.2rem; color: var(--primary);"></div>
</div>
