<div class="feature-content fade-in">
    <h2>AI Concerns</h2>
    <p>Ask our AI about any health or dietary concerns you might have.</p>
    <div class="form-group" style="margin-top: 1rem;">
        <input type="text" id="ai-input" placeholder="Why do I feel tired after eating carbs?" style="width: 100%; border-radius: 8px; padding: 1rem; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--surface-border);">
    </div>
    <button class="btn btn-primary" onclick="askAI()">Ask AI</button>
    <div id="ai-result" style="margin-top: 1.5rem; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 8px; display: none;"></div>
</div>
