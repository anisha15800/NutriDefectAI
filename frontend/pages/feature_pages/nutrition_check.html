<div class="feature-content fade-in">
    <h2>Nutrition Check</h2>
    <p>Log your meals to check for potential nutritional deficiencies.</p>
    <div class="form-group" style="margin-top: 1rem;">
        <textarea id="nutrition-input" rows="4" placeholder="E.g., I had 2 eggs for breakfast and a salad for lunch..." style="width: 100%; border-radius: 8px; padding: 1rem; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--surface-border);"></textarea>
    </div>
    <button class="btn btn-primary" onclick="submitNutritionCheck()">Analyze</button>
    <div id="nutrition-result" style="margin-top: 1.5rem; color: var(--primary);"></div>
</div>
