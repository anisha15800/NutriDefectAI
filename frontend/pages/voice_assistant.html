<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriVision - Voice Assistant</title>
  <link rel="stylesheet" href="../css/style.css?v=2">
  <style>
    .service-hero {
      text-align: center;
      padding: 4rem 5% 2rem 5%;
    }
    .service-hero h1 { font-size: 3rem; font-weight: 800; color: var(--text-primary); margin-bottom: 1rem; }
    .service-hero h1 span {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .service-hero p { font-size: 1.2rem; color: var(--text-secondary); max-width: 700px; margin: 0 auto 2rem auto; line-height: 1.6; }
    
    .service-container {
      max-width: 800px;
      margin: 0 auto 4rem auto;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 16px;
      padding: 3rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .mic-container {
      margin-top: 1rem;
      margin-bottom: 3rem;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 150px;
      height: 150px;
    }

    .mic-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--surface);
      border: 4px solid var(--primary);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
    }

    .mic-btn svg {
      width: 40px;
      height: 40px;
      stroke: var(--primary);
      transition: all 0.3s ease;
    }

    .mic-btn:hover {
      transform: scale(1.05);
      background: var(--primary);
    }

    .mic-btn:hover svg {
      stroke: white;
    }

    .mic-btn.active {
      background: var(--primary);
      box-shadow: 0 0 0 10px rgba(16, 185, 129, 0.2), 0 0 0 20px rgba(16, 185, 129, 0.1);
      animation: pulse 1.5s infinite;
    }

    .mic-btn.active svg {
      stroke: white;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 30px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    .status-text {
      font-size: 1.25rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      font-weight: 500;
      text-align: center;
      min-height: 1.5em;
    }

    .chat-container {
      width: 100%;
      background: var(--background);
      border: 1px solid var(--surface-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-height: 400px;
    }

    .chat-bubble {
      max-width: 80%;
      padding: 1rem 1.5rem;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 1rem;
      animation: fadeIn 0.3s ease;
    }

    .chat-bubble.user {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .chat-bubble.ai {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .loading-dots::after {
      content: '.';
      animation: dots 1.5s steps(5, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60% { content: '...'; }
      80%, 100% { content: ''; }
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main>
    <section class="service-hero">
      <h1>Voice <span>Assistant AI</span></h1>
      <p>Speak directly to our clinical AI assistant about your symptoms to receive instant feedback.</p>
    </section>

    <div class="service-container">
      <div class="mic-container">
        <div class="mic-btn" id="mic-btn" onclick="toggleListening()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </div>
      </div>

      <div class="status-text" id="status-text">Tap the microphone to start speaking...</div>
      <div id="interim-text" style="color: var(--text-secondary); font-style: italic; margin-bottom: 1rem; min-height: 1.5em; text-align: center;"></div>

      <div class="chat-container" id="chat-container">
        <div class="chat-bubble ai">
          Hello! I'm your medical AI assistant. What symptoms are you experiencing today?
        </div>
      </div>

      <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem; width: 100%;">
        <input type="text" id="fallback-input" placeholder="Or type your symptoms here if mic fails..." style="flex: 1; padding: 1rem; border-radius: 8px; border: 1px solid var(--surface-border); background: var(--background); color: var(--text-primary); font-size: 1rem; outline: none;">
        <button class="btn btn-primary" onclick="handleFallbackSubmit()">Send</button>
      </div>
    </div>
  </main>

  <script src="../js/main.js?v=2"></script>
  <script>
    const API_BASE = 'http://127.0.0.1:5000/api';
    let isListening = false;
    let recognition;
    let isSpeaking = false;

    // Check for browser support
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false; // Stop when the user stops speaking
      recognition.interimResults = true; // Show live transcription
      recognition.lang = 'en-US';

      recognition.onstart = function() {
        isListening = true;
        document.getElementById('mic-btn').classList.add('active');
        document.getElementById('status-text').innerText = "Listening...";
        document.getElementById('interim-text').innerText = "";
        
        // Stop any currently playing AI voice
        if (window.speechSynthesis && window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
        }
      };

      recognition.onresult = function(event) {
        let interimTranscript = '';
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }
        
        document.getElementById('interim-text').innerText = interimTranscript;

        if (finalTranscript !== '') {
          document.getElementById('interim-text').innerText = "";
          addChatBubble(finalTranscript, 'user');
          sendToAI(finalTranscript);
        }
      };

      recognition.onerror = function(event) {
        console.error("Speech recognition error", event.error);
        
        let errorMsg = event.error;
        if (event.error === 'not-allowed') {
          errorMsg = "Microphone access denied. (Ensure you are using localhost or https://)";
        }
        
        document.getElementById('status-text').innerText = `Mic error: ${errorMsg}. You can type below instead.`;
        resetMic();
      };

      recognition.onend = function() {
        resetMic();
        if (document.getElementById('status-text').innerText === "Listening...") {
           document.getElementById('status-text').innerText = "Processing...";
        }
      };
    } else {
      document.getElementById('status-text').innerText = "Speech Recognition API not supported in this browser. Please type below.";
      document.getElementById('mic-btn').style.display = 'none';
    }

    function toggleListening() {
      if (isListening) {
        recognition.stop();
      } else {
        try {
          recognition.start();
        } catch(e) {
          console.error("Could not start recognition", e);
        }
      }
    }

    function resetMic() {
      isListening = false;
      document.getElementById('mic-btn').classList.remove('active');
      if (document.getElementById('status-text').innerText === "Listening...") {
        document.getElementById('status-text').innerText = "Tap the microphone to speak.";
      }
    }

    function handleFallbackSubmit() {
      const input = document.getElementById('fallback-input');
      const text = input.value.trim();
      if (text) {
        addChatBubble(text, 'user');
        sendToAI(text);
        input.value = '';
      }
    }

    function addChatBubble(text, sender) {
      const container = document.getElementById('chat-container');
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${sender}`;
      bubble.innerText = text;
      container.appendChild(bubble);
      container.scrollTop = container.scrollHeight;
    }

    async function sendToAI(transcript) {
      document.getElementById('status-text').innerHTML = 'AI is thinking<span class="loading-dots"></span>';
      document.getElementById('mic-btn').style.pointerEvents = 'none';

      try {
        const res = await fetch(`${API_BASE}/ai/voice_consult`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcript: transcript })
        });
        
        const data = await res.json();
        
        if (data.error) {
          addChatBubble("Sorry, I encountered an error. Please try again.", 'ai');
          speakOutLoud("Sorry, I encountered an error.");
        } else {
          addChatBubble(data.response, 'ai');
          speakOutLoud(data.response);
        }
      } catch (err) {
        console.error(err);
        addChatBubble("Sorry, I'm having trouble connecting to the server.", 'ai');
        speakOutLoud("Sorry, I'm having trouble connecting to the server.");
      }

      document.getElementById('status-text').innerText = "Tap the microphone to reply.";
      document.getElementById('mic-btn').style.pointerEvents = 'auto';
    }

    function speakOutLoud(text) {
      if (!('speechSynthesis' in window)) return;
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.lang = 'en-US';
      
      const voices = window.speechSynthesis.getVoices();
      const preferredVoice = voices.find(v => v.name.includes('Google') || v.name.includes('Samantha') || v.name.includes('Natural'));
      if (preferredVoice) {
        utterance.voice = preferredVoice;
      }
      
      utterance.onstart = () => { isSpeaking = true; };
      utterance.onend = () => { isSpeaking = false; };
      
      window.speechSynthesis.speak(utterance);
    }
    
    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => {
         window.speechSynthesis.getVoices();
      };
    }
  </script>
</body>
</html>
